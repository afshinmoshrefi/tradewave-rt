{% extends "base.html" %}
{% block title %}{{ 'Edit' if post else 'New' }} post{% endblock %}
{% block content %}
<div class="app-head">
  <div><div class="eyebrow"><a class="muted" href="{{ url_for('admin.posts_list') }}">Posts</a> › {{ 'Edit' if post else 'New' }}</div>
  <h1 style="font-size:1.7rem">{{ 'Edit post' if post else 'New post' }}</h1></div>
</div>
<form method="post" class="card" style="max-width:760px">
  <div class="field">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required value="{{ post.title if post else '' }}" placeholder="Post title">
  </div>
  <div class="field">
    <label for="body">Body <span class="muted small">(Markdown supported)</span></label>
    <textarea id="body" name="body" placeholder="Write to your members…">{{ post.body if post else '' }}</textarea>
  </div>
  <label class="check" style="margin-bottom:16px">
    <input type="checkbox" name="published" value="1" {{ 'checked' if (post is none) or post.published else '' }}>
    <span>Published (visible to members in the feed)</span>
  </label>
  <div class="btn-row">
    <button class="btn btn-primary" type="submit">{{ 'Save' if post else 'Publish' }}</button>
    <a class="btn btn-ghost" href="{{ url_for('admin.posts_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
