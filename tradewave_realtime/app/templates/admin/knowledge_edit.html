{% extends "base.html" %}
{% block title %}{{ 'Edit' if entry else 'New' }} knowledge{% endblock %}
{% block content %}
<div class="app-head">
  <div><div class="eyebrow"><a class="muted" href="{{ url_for('admin.knowledge_list') }}">Knowledge</a> › {{ 'Edit' if entry else 'New' }}</div>
  <h1 style="font-size:1.7rem">{{ 'Edit knowledge' if entry else 'New knowledge' }}</h1></div>
</div>
<form method="post" class="card" style="max-width:760px">
  <div class="field">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required value="{{ entry.title if entry else '' }}"
           placeholder="e.g. The failed-retest entry">
  </div>
  <div class="grid grid-2">
    <div class="field">
      <label for="category">Category</label>
      <select id="category" name="category">
        {% for c in categories %}
          <option value="{{ c }}" {{ 'selected' if entry and entry.category==c else '' }}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="provenance">Whose words</label>
      <select id="provenance" name="provenance">
        <option value="her_words" {{ 'selected' if entry and entry.provenance=='her_words' }}>Anne-Marie's words (recorded/spoken - pre-approved)</option>
        <option value="her_approved" {{ 'selected' if entry and entry.provenance=='her_approved' }}>Drafted, Anne-Marie approved</option>
        <option value="team_inference" {{ 'selected' if (not entry) or entry.provenance=='team_inference' }}>Team-written (coach will hedge if asked)</option>
      </select>
    </div>
    <div class="field">
      <label for="source">Source (optional)</label>
      <input type="text" id="source" name="source" value="{{ entry.source if entry else '' }}" placeholder="e.g. The Trading Book, p.42">
    </div>
  </div>
  <div class="field">
    <label for="content">Content <span class="muted small">(Markdown supported - this is what the coach learns)</span></label>
    <textarea id="content" name="content" placeholder="Teach the coach in your own words…">{{ entry.content if entry else '' }}</textarea>
  </div>
  <label class="check" style="margin-bottom:16px">
    <input type="checkbox" name="published" value="1" {{ 'checked' if (entry is none) or entry.published else '' }}>
    <span>Published (the coach uses published entries when it answers)</span>
  </label>
  <div class="btn-row">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-ghost" href="{{ url_for('admin.knowledge_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
